<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edenelle Création</title>
  <style>
/* ═══════════════════════════════════════════
   EDENELLE CRÉATION — Global Stylesheet
   ═══════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&family=Dancing+Script:wght@500;700&family=Sacramento&family=Rochester&family=Great+Vibes&family=Pacifico&family=Satisfy&family=Italianno&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FAF7F2;
  --warm-white: #FFFEF9;
  --blush: #F2E8E0;
  --taupe: #C4AFA3;
  --dark-taupe: #8C7B72;
  --text: #3A2E2A;
  --text-light: #7A6E6A;
  --gold: #C9A96E;
  --gold-light: #E8D5B0;
  --border: #E8DDD5;
  --error: #C0392B;
}

html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); font-weight: 300; line-height: 1.7; }

/* ── TYPOGRAPHY ── */
h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; font-weight: 300; }
em { font-style: italic; }

.section-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 12px; display: block; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 3.5vw, 46px); font-weight: 300; line-height: 1.2; color: var(--text); margin-bottom: 8px; }
.section-title em { color: var(--dark-taupe); }

/* ── BUTTONS ── */
.btn-primary { background: var(--text); color: var(--cream); padding: 14px 32px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; font-family: 'Jost', sans-serif; font-weight: 400; border: none; cursor: pointer; transition: background 0.25s, transform 0.2s; display: inline-block; }
.btn-primary:hover { background: var(--dark-taupe); transform: translateY(-1px); }
.btn-outline { border: 1px solid var(--text); color: var(--text); padding: 14px 32px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; font-family: 'Jost', sans-serif; font-weight: 400; background: none; cursor: pointer; transition: background 0.25s, color 0.25s; display: inline-block; }
.btn-outline:hover { background: var(--text); color: var(--cream); }
.btn-gold { background: var(--gold); color: var(--text); padding: 14px 32px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; font-family: 'Jost', sans-serif; font-weight: 400; border: none; cursor: pointer; transition: background 0.2s; display: inline-block; }
.btn-gold:hover { background: var(--gold-light); }

/* ── TOP BANNER ── */
.top-banner { background: var(--text); color: var(--gold-light); text-align: center; padding: 10px 20px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; overflow: hidden; }
.banner-track { display: inline-flex; gap: 60px; animation: scroll-banner 25s linear infinite; white-space: nowrap; }
@keyframes scroll-banner { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* ── NAV ── */
nav { background: var(--warm-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
.nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.08em; color: var(--text); text-decoration: none; flex-shrink: 0; }
.nav-logo span { color: var(--gold); font-style: italic; }
.nav-links { display: flex; gap: 0; list-style: none; }
.nav-links > li { position: relative; }
.nav-links > li > a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); text-decoration: none; font-weight: 400; padding: 24px 16px; display: block; transition: color 0.2s; }
.nav-links > li > a:hover { color: var(--gold); }
.nav-links > li > a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
/* Dropdown */
.nav-dropdown { position: absolute; top: 100%; left: 0; background: var(--warm-white); border: 1px solid var(--border); border-top: 2px solid var(--gold); min-width: 200px; opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.2s; z-index: 300; }
.nav-links > li:hover .nav-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
.nav-dropdown a { display: block; padding: 10px 20px; font-size: 12px; color: var(--text-light); text-decoration: none; transition: color 0.2s, background 0.2s; letter-spacing: 0.06em; }
.nav-dropdown a:hover { color: var(--text); background: var(--cream); }
.nav-right { display: flex; gap: 8px; align-items: center; }
.nav-icon { background: none; border: none; cursor: pointer; color: var(--text); font-size: 18px; padding: 8px; transition: color 0.2s; position: relative; }
.nav-icon:hover { color: var(--gold); }
.cart-count { position: absolute; top: 2px; right: 2px; background: var(--gold); color: var(--text); font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Jost'; font-weight: 500; }
.nav-burger { display: none; background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text); }

/* ── BREADCRUMB ── */
.breadcrumb-wrap { background: var(--warm-white); border-bottom: 1px solid var(--border); }
.breadcrumb { max-width: 1280px; margin: 0 auto; padding: 12px 32px; font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.breadcrumb a { color: var(--text-light); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--gold); }
.breadcrumb-sep { color: var(--taupe); }

/* ── SECTIONS ── */
.section { padding: 80px 32px; }
.section-inner { max-width: 1280px; margin: 0 auto; }
.section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }

/* ── PRODUCT CARDS ── */
.product-card { background: var(--cream); text-decoration: none; color: var(--text); display: block; transition: transform 0.25s; }
.product-card:hover { transform: translateY(-4px); }
.product-img-wrap { aspect-ratio: 3/4; background: linear-gradient(145deg, var(--blush) 0%, var(--taupe) 100%); position: relative; overflow: hidden; }
.product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.product-card:hover .product-img-wrap img { transform: scale(1.04); }
.product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--dark-taupe); font-family: 'Cormorant Garamond'; font-style: italic; font-size: 15px; }
.product-badge { position: absolute; top: 12px; left: 12px; background: var(--text); color: var(--cream); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; z-index: 1; }
.product-badge.promo { background: var(--gold); color: var(--text); }
.product-info { padding: 16px; }
.product-cat { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); margin-bottom: 4px; }
.product-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; line-height: 1.3; }
.product-prices { display: flex; align-items: baseline; gap: 8px; }
.price-current { font-size: 15px; color: var(--text); font-weight: 400; }
.price-original { font-size: 13px; color: var(--text-light); text-decoration: line-through; }
.product-colors { display: flex; gap: 4px; margin-top: 8px; }
.product-color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--border); }

/* ── REVIEWS ── */
.stars { color: var(--gold); letter-spacing: 2px; }

/* ── FOOTER ── */
footer { background: #2A1F1B; color: var(--gold-light); }
.footer-main { max-width: 1280px; margin: 0 auto; padding: 60px 32px 40px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; }
.footer-brand .nav-logo { color: var(--gold-light); font-size: 24px; }
.footer-brand p { font-size: 13px; color: var(--taupe); line-height: 1.8; margin-top: 16px; max-width: 280px; }
.footer-social { display: flex; gap: 10px; margin-top: 20px; }
.social-btn { width: 36px; height: 36px; border: 1px solid var(--taupe); display: flex; align-items: center; justify-content: center; color: var(--taupe); text-decoration: none; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; transition: all 0.2s; }
.social-btn:hover { border-color: var(--gold); color: var(--gold); }
.footer-col h4 { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; font-weight: 500; }
.footer-col ul { list-style: none; }
.footer-col li { margin-bottom: 10px; }
.footer-col a { color: var(--taupe); text-decoration: none; font-size: 13px; transition: color 0.2s; }
.footer-col a:hover { color: var(--gold-light); }
.footer-bottom { border-top: 1px solid rgba(196,175,163,0.15); padding: 20px 32px; max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; font-size: 11px; color: var(--dark-taupe); flex-wrap: wrap; gap: 8px; }

/* ── BADGE STRIP ── */
.badge-strip { background: var(--warm-white); border-bottom: 1px solid var(--border); overflow: hidden; padding: 14px 0; }
.badge-strip-track { display: inline-flex; gap: 56px; white-space: nowrap; animation: scroll-banner 28s linear infinite; }
.badge-item { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
.badge-item strong { color: var(--gold); font-weight: 500; }

/* ── FONT CLASSES (broderie preview) ── */
.f-natalia    { font-family: 'Dancing Script', cursive; font-weight: 700; }
.f-lovely     { font-family: 'Great Vibes', cursive; }
.f-adelia     { font-family: 'Italianno', cursive; }
.f-marchila   { font-family: 'Satisfy', cursive; }
.f-laughing   { font-family: 'Pacifico', cursive; }
.f-charlotte  { font-family: 'Sacramento', cursive; }
.f-sacramento { font-family: 'Rochester', cursive; }
.f-larianti   { font-family: 'Cormorant Garamond', serif; font-style: italic; }
.f-rochester  { font-family: 'Jost', sans-serif; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .footer-main { grid-template-columns: 1fr 1fr; gap: 32px; }
}
@media (max-width: 900px) {
  .nav-links { display: none; }
  .nav-burger { display: block; }
  .section { padding: 56px 20px; }
  .nav-inner { padding: 0 20px; }
}
@media (max-width: 600px) {
  .footer-main { grid-template-columns: 1fr; gap: 28px; }
  .footer-bottom { flex-direction: column; }
  .breadcrumb { padding: 10px 20px; }
}


    /* ─── CONFIG KEYS ─── */
    /* Remplacez ces deux valeurs dans le fichier paiement.js */

    .cart-page { max-width: 1180px; margin: 0 auto; padding: 40px 32px 100px; }

    /* Steps */
    .checkout-steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 48px; }
    .cs { display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); }
    .cs.active { color: var(--text); font-weight: 500; }
    .cs.done { color: var(--gold); }
    .cs-n { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; transition: all 0.3s; }
    .cs.done .cs-n { background: var(--gold); border-color: var(--gold); color: var(--text); }
    .cs.active .cs-n { background: var(--text); border-color: var(--text); color: var(--cream); }
    .cs-line { width: 56px; height: 1px; background: var(--border); margin: 0 6px; }

    /* Layout */
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }

    /* Cart box */
    .cart-box { background: var(--warm-white); border: 1px solid var(--border); }
    .box-head { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .box-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 400; }
    .cart-row { padding: 18px 24px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 70px 1fr auto; gap: 14px; align-items: start; }
    .c-thumb { width: 70px; height: 70px; background: linear-gradient(145deg,var(--blush),var(--taupe)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .c-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; margin-bottom: 4px; }
    .c-perso { font-size: 11px; color: var(--text-light); margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
    .c-perso span { background: var(--blush); padding: 2px 7px; }
    .qty-c { display: inline-flex; align-items: center; border: 1px solid var(--border); }
    .qty-b { width: 30px; height: 30px; background: none; border: none; cursor: pointer; font-size: 17px; color: var(--text); transition: background 0.15s; }
    .qty-b:hover { background: var(--blush); }
    .qty-v { width: 34px; height: 30px; text-align: center; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); font-family: 'Jost'; font-size: 13px; background: var(--warm-white); color: var(--text); }
    .c-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .c-price { font-size: 16px; white-space: nowrap; }
    .c-del { background: none; border: none; cursor: pointer; color: var(--taupe); font-size: 21px; line-height: 1; transition: color 0.2s; padding: 2px; }
    .c-del:hover { color: #c0392b; }
    .empty-state { padding: 72px 24px; text-align: center; }
    .empty-state .big { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-style: italic; color: var(--text-light); margin-bottom: 24px; }

    /* Promo */
    .promo-row { padding: 14px 24px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
    .promo-inp { flex: 1; border: 1px solid var(--border); padding: 10px 13px; font-family: 'Jost'; font-size: 13px; outline: none; background: var(--cream); transition: border-color 0.2s; text-transform: uppercase; }
    .promo-inp:focus { border-color: var(--taupe); }
    .promo-apply { padding: 10px 16px; background: var(--text); color: var(--cream); border: none; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-family: 'Jost'; cursor: pointer; white-space: nowrap; }
    .promo-ok { padding: 10px 24px; font-size: 13px; color: #2E7D32; background: #E8F5E9; display: none; align-items: center; gap: 6px; }
    .promo-ok.show { display: flex; }

    /* Summary */
    .sum-box { background: var(--warm-white); border: 1px solid var(--border); position: sticky; top: 88px; }
    .sum-head { padding: 18px 24px; border-bottom: 1px solid var(--border); }
    .sum-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 400; }
    .sum-lines { padding: 18px 24px 12px; }
    .sum-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 9px; color: var(--text-light); }
    .sum-line.total { font-size: 17px; color: var(--text); font-weight: 500; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .sum-line.total span:last-child { font-family: 'Cormorant Garamond', serif; font-size: 22px; }
    .ship-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-light); margin: 0 0 8px; }
    .ship-opt { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border: 1px solid var(--border); margin-bottom: 7px; cursor: pointer; transition: all 0.2s; }
    .ship-opt:hover, .ship-opt.active { border-color: var(--taupe); background: var(--blush); }
    .ship-opt input[type=radio] { accent-color: var(--gold); flex-shrink: 0; }
    .ship-name { font-size: 13px; color: var(--text); }
    .ship-detail { font-size: 11px; color: var(--text-light); }
    .sum-cta { padding: 4px 24px 20px; }
    .btn-co { width: 100%; padding: 15px; background: var(--text); color: var(--cream); border: none; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-family: 'Jost'; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; }
    .btn-co:hover:not(:disabled) { background: var(--dark-taupe); }
    .btn-co:disabled { opacity: 0.38; cursor: not-allowed; }
    .secure-lbl { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 11px; color: var(--text-light); margin-bottom: 16px; }
    .trust-row { padding: 0 24px 18px; }
    .t-item { font-size: 12px; color: var(--text-light); margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(42,31,27,0.68); z-index: 600; display: none; align-items: center; justify-content: center; padding: 16px; }
    .overlay.open { display: flex; }
    .modal { background: var(--warm-white); max-width: 580px; width: 100%; max-height: 92vh; overflow-y: auto; display: flex; flex-direction: column; }
    .modal-hd { padding: 22px 26px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--warm-white); z-index: 2; }
    .modal-hd h3 { font-family: 'Cormorant Garamond', serif; font-size: 23px; font-weight: 400; }
    .modal-x { background: none; border: none; font-size: 27px; cursor: pointer; color: var(--taupe); line-height: 1; padding: 0 2px; }
    .modal-bd { padding: 26px; flex: 1; }
    .mstep { display: none; }
    .mstep.active { display: block; }
    .mlbl { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; display: block; }
    .mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin-bottom: 13px; }
    .mgrid.full { grid-template-columns: 1fr; }
    .mfg { display: flex; flex-direction: column; gap: 5px; }
    .mfl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text); font-weight: 500; }
    .mfi { border: 1px solid var(--border); background: var(--cream); padding: 10px 13px; font-family: 'Jost'; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; }
    .mfi:focus { border-color: var(--taupe); }
    .mfi.err { border-color: #c0392b; animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* Recap */
    .recap-box { background: var(--cream); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 18px; }
    .recap-line { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: var(--text-light); }
    .recap-line.total { font-size: 15px; color: var(--text); font-weight: 500; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 3px; }

    /* Payment tabs */
    .pay-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .pay-tab { border: 2px solid var(--border); padding: 14px 10px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .pay-tab:hover, .pay-tab.active { border-color: var(--dark-taupe); background: var(--blush); }
    .pay-tab .p-ico { font-size: 22px; margin-bottom: 4px; }
    .pay-tab .p-lbl { font-size: 12px; color: var(--text); font-weight: 400; }
    .pay-panel { display: none; }
    .pay-panel.active { display: block; }

    /* Stripe card element */
    .stripe-wrap { border: 1px solid var(--border); padding: 13px 14px; background: var(--cream); margin-bottom: 14px; transition: border-color 0.2s; }
    .stripe-wrap.focused { border-color: var(--taupe); }
    #stripe-card-errors { color: #c0392b; font-size: 12px; margin-top: 6px; min-height: 16px; }
    .stripe-secure { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-light); margin-top: 8px; }
    .stripe-badges { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .stripe-badge { border: 1px solid var(--border); padding: 4px 9px; font-size: 10px; color: var(--text-light); letter-spacing: 0.05em; }

    /* PayPal container */
    #paypal-button-container { min-height: 48px; }
    .paypal-note { font-size: 12px; color: var(--text-light); margin-bottom: 14px; padding: 10px 12px; background: var(--blush); border: 1px solid var(--border); }

    /* Info blocks */
    .info-blk { padding: 13px 15px; background: var(--blush); border: 1px solid var(--border); font-size: 13px; color: var(--text-light); line-height: 1.7; margin-bottom: 12px; }

    /* Modal nav */
    .mnav { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

    /* Processing overlay */
    .processing { display: none; position: absolute; inset: 0; background: rgba(250,247,242,0.88); align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 10; }
    .processing.show { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Success */
    .success-wrap { text-align: center; padding: 16px 0; }
    .success-wrap .s-ico { font-size: 60px; margin-bottom: 18px; }

// ── CART STATE ──
const Cart = {
  items: JSON.parse(localStorage.getItem('edenelle_cart') || '[]'),
  
  add(item) {
    this.items.push(item);
    this.save();
    this.updateCount();
    this.showNotif(item.name);
  },
  
  remove(index) {
    this.items.splice(index, 1);
    this.save();
    this.updateCount();
  },
  
  save() {
    localStorage.setItem('edenelle_cart', JSON.stringify(this.items));
  },
  
  total() {
    return this.items.reduce((sum, i) => sum + i.price, 0).toFixed(2);
  },
  
  count() { return this.items.length; },
  
  updateCount() {
    document.querySelectorAll('.cart-count').forEach(el => {
      el.textContent = this.count();
      el.style.display = this.count() > 0 ? 'flex' : 'none';
    });
  },
  
  showNotif(name) {
    const notif = document.getElementById('cart-notif');
    if (!notif) return;
    notif.querySelector('.notif-name').textContent = name;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 3000);
  }
};
