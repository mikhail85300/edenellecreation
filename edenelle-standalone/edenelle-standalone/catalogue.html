<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edenelle Création</title>
  <style>
/* ═══════════════════════════════════════════
   EDENELLE CRÉATION — Global Stylesheet
   ═══════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&family=Dancing+Script:wght@500;700&family=Sacramento&family=Rochester&family=Great+Vibes&family=Pacifico&family=Satisfy&family=Italianno&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FAF7F2;
  --warm-white: #FFFEF9;
  --blush: #F2E8E0;
  --taupe: #C4AFA3;
  --dark-taupe: #8C7B72;
  --text: #3A2E2A;
  --text-light: #7A6E6A;
  --gold: #C9A96E;
  --gold-light: #E8D5B0;
  --border: #E8DDD5;
  --error: #C0392B;
}

html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); font-weight: 300; line-height: 1.7; }

/* ── TYPOGRAPHY ── */
h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; font-weight: 300; }
em { font-style: italic; }

.section-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 12px; display: block; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 3.5vw, 46px); font-weight: 300; line-height: 1.2; color: var(--text); margin-bottom: 8px; }
.section-title em { color: var(--dark-taupe); }

/* ── BUTTONS ── */
.btn-primary { background: var(--text); color: var(--cream); padding: 14px 32px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; font-family: 'Jost', sans-serif; font-weight: 400; border: none; cursor: pointer; transition: background 0.25s, transform 0.2s; display: inline-block; }
.btn-primary:hover { background: var(--dark-taupe); transform: translateY(-1px); }
.btn-outline { border: 1px solid var(--text); color: var(--text); padding: 14px 32px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; font-family: 'Jost', sans-serif; font-weight: 400; background: none; cursor: pointer; transition: background 0.25s, color 0.25s; display: inline-block; }
.btn-outline:hover { background: var(--text); color: var(--cream); }
.btn-gold { background: var(--gold); color: var(--text); padding: 14px 32px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; font-family: 'Jost', sans-serif; font-weight: 400; border: none; cursor: pointer; transition: background 0.2s; display: inline-block; }
.btn-gold:hover { background: var(--gold-light); }

/* ── TOP BANNER ── */
.top-banner { background: var(--text); color: var(--gold-light); text-align: center; padding: 10px 20px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; overflow: hidden; }
.banner-track { display: inline-flex; gap: 60px; animation: scroll-banner 25s linear infinite; white-space: nowrap; }
@keyframes scroll-banner { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* ── NAV ── */
nav { background: var(--warm-white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
.nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.08em; color: var(--text); text-decoration: none; flex-shrink: 0; }
.nav-logo span { color: var(--gold); font-style: italic; }
.nav-links { display: flex; gap: 0; list-style: none; }
.nav-links > li { position: relative; }
.nav-links > li > a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); text-decoration: none; font-weight: 400; padding: 24px 16px; display: block; transition: color 0.2s; }
.nav-links > li > a:hover { color: var(--gold); }
.nav-links > li > a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
/* Dropdown */
.nav-dropdown { position: absolute; top: 100%; left: 0; background: var(--warm-white); border: 1px solid var(--border); border-top: 2px solid var(--gold); min-width: 200px; opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.2s; z-index: 300; }
.nav-links > li:hover .nav-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
.nav-dropdown a { display: block; padding: 10px 20px; font-size: 12px; color: var(--text-light); text-decoration: none; transition: color 0.2s, background 0.2s; letter-spacing: 0.06em; }
.nav-dropdown a:hover { color: var(--text); background: var(--cream); }
.nav-right { display: flex; gap: 8px; align-items: center; }
.nav-icon { background: none; border: none; cursor: pointer; color: var(--text); font-size: 18px; padding: 8px; transition: color 0.2s; position: relative; }
.nav-icon:hover { color: var(--gold); }
.cart-count { position: absolute; top: 2px; right: 2px; background: var(--gold); color: var(--text); font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Jost'; font-weight: 500; }
.nav-burger { display: none; background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text); }

/* ── BREADCRUMB ── */
.breadcrumb-wrap { background: var(--warm-white); border-bottom: 1px solid var(--border); }
.breadcrumb { max-width: 1280px; margin: 0 auto; padding: 12px 32px; font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.breadcrumb a { color: var(--text-light); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--gold); }
.breadcrumb-sep { color: var(--taupe); }

/* ── SECTIONS ── */
.section { padding: 80px 32px; }
.section-inner { max-width: 1280px; margin: 0 auto; }
.section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }

/* ── PRODUCT CARDS ── */
.product-card { background: var(--cream); text-decoration: none; color: var(--text); display: block; transition: transform 0.25s; }
.product-card:hover { transform: translateY(-4px); }
.product-img-wrap { aspect-ratio: 3/4; background: linear-gradient(145deg, var(--blush) 0%, var(--taupe) 100%); position: relative; overflow: hidden; }
.product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.product-card:hover .product-img-wrap img { transform: scale(1.04); }
.product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--dark-taupe); font-family: 'Cormorant Garamond'; font-style: italic; font-size: 15px; }
.product-badge { position: absolute; top: 12px; left: 12px; background: var(--text); color: var(--cream); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; z-index: 1; }
.product-badge.promo { background: var(--gold); color: var(--text); }
.product-info { padding: 16px; }
.product-cat { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); margin-bottom: 4px; }
.product-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; line-height: 1.3; }
.product-prices { display: flex; align-items: baseline; gap: 8px; }
.price-current { font-size: 15px; color: var(--text); font-weight: 400; }
.price-original { font-size: 13px; color: var(--text-light); text-decoration: line-through; }
.product-colors { display: flex; gap: 4px; margin-top: 8px; }
.product-color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--border); }

/* ── REVIEWS ── */
.stars { color: var(--gold); letter-spacing: 2px; }

/* ── FOOTER ── */
footer { background: #2A1F1B; color: var(--gold-light); }
.footer-main { max-width: 1280px; margin: 0 auto; padding: 60px 32px 40px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; }
.footer-brand .nav-logo { color: var(--gold-light); font-size: 24px; }
.footer-brand p { font-size: 13px; color: var(--taupe); line-height: 1.8; margin-top: 16px; max-width: 280px; }
.footer-social { display: flex; gap: 10px; margin-top: 20px; }
.social-btn { width: 36px; height: 36px; border: 1px solid var(--taupe); display: flex; align-items: center; justify-content: center; color: var(--taupe); text-decoration: none; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; transition: all 0.2s; }
.social-btn:hover { border-color: var(--gold); color: var(--gold); }
.footer-col h4 { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; font-weight: 500; }
.footer-col ul { list-style: none; }
.footer-col li { margin-bottom: 10px; }
.footer-col a { color: var(--taupe); text-decoration: none; font-size: 13px; transition: color 0.2s; }
.footer-col a:hover { color: var(--gold-light); }
.footer-bottom { border-top: 1px solid rgba(196,175,163,0.15); padding: 20px 32px; max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; font-size: 11px; color: var(--dark-taupe); flex-wrap: wrap; gap: 8px; }

/* ── BADGE STRIP ── */
.badge-strip { background: var(--warm-white); border-bottom: 1px solid var(--border); overflow: hidden; padding: 14px 0; }
.badge-strip-track { display: inline-flex; gap: 56px; white-space: nowrap; animation: scroll-banner 28s linear infinite; }
.badge-item { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
.badge-item strong { color: var(--gold); font-weight: 500; }

/* ── FONT CLASSES (broderie preview) ── */
.f-natalia    { font-family: 'Dancing Script', cursive; font-weight: 700; }
.f-lovely     { font-family: 'Great Vibes', cursive; }
.f-adelia     { font-family: 'Italianno', cursive; }
.f-marchila   { font-family: 'Satisfy', cursive; }
.f-laughing   { font-family: 'Pacifico', cursive; }
.f-charlotte  { font-family: 'Sacramento', cursive; }
.f-sacramento { font-family: 'Rochester', cursive; }
.f-larianti   { font-family: 'Cormorant Garamond', serif; font-style: italic; }
.f-rochester  { font-family: 'Jost', sans-serif; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .footer-main { grid-template-columns: 1fr 1fr; gap: 32px; }
}
@media (max-width: 900px) {
  .nav-links { display: none; }
  .nav-burger { display: block; }
  .section { padding: 56px 20px; }
  .nav-inner { padding: 0 20px; }
}
@media (max-width: 600px) {
  .footer-main { grid-template-columns: 1fr; gap: 28px; }
  .footer-bottom { flex-direction: column; }
  .breadcrumb { padding: 10px 20px; }
}


    .catalogue-layout { max-width:1280px; margin:0 auto; padding:40px 32px; display:grid; grid-template-columns:260px 1fr; gap:40px; align-items:start; }
    /* FILTERS */
    .filters { position:sticky; top:90px; background:var(--warm-white); border:1px solid var(--border); padding:28px; }
    .filter-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text); font-weight:500; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    .filter-group { margin-bottom:24px; }
    .filter-group h4 { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-light); margin-bottom:12px; font-family:'Jost'; font-weight:400; }
    .filter-opt { display:flex; align-items:center; gap:10px; margin-bottom:8px; cursor:pointer; }
    .filter-opt input { accent-color:var(--gold); width:14px; height:14px; cursor:pointer; }
    .filter-opt label { font-size:13px; color:var(--text); cursor:pointer; }
    .filter-opt label span { color:var(--text-light); font-size:11px; }
    .price-range { width:100%; accent-color:var(--gold); }
    .price-display { display:flex; justify-content:space-between; font-size:12px; color:var(--text-light); margin-top:8px; }
    .filter-reset { font-size:11px; color:var(--taupe); text-decoration:none; letter-spacing:0.08em; cursor:pointer; display:block; text-align:center; margin-top:8px; }
    .filter-reset:hover { color:var(--gold); }
    /* CATALOGUE RIGHT */
    .catalogue-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .cat-count { font-size:13px; color:var(--text-light); }
    .sort-select { border:1px solid var(--border); background:var(--warm-white); padding:8px 14px; font-family:'Jost',sans-serif; font-size:12px; color:var(--text); cursor:pointer; outline:none; }
    .cat-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .cat-pill { border:1px solid var(--border); background:var(--warm-white); padding:7px 16px; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'Jost'; }
    .cat-pill:hover, .cat-pill.active { border-color:var(--text); background:var(--text); color:var(--cream); }
    .prod-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .load-more { display:block; margin:40px auto 0; padding:14px 40px; }
    @media(max-width:900px) {
      .catalogue-layout { grid-template-columns:1fr; }
      .filters { position:static; }
      .prod-grid { grid-template-columns:repeat(2,1fr); }
    }
    @media(max-width:500px) { .prod-grid { grid-template-columns:1fr; } }
  
  </style>
</head>

  <div id="badge-strip"></div>

  <div class="breadcrumb-wrap">

  <div class="catalogue-layout">

    <aside class="filters">

      <div class="filter-group">
        <h4>Catégorie</h4>

        <div class="filter-opt"><input type="checkbox" id="f-couvertures" onchange="filterProducts()"/><label for="f-couvertures">Couvertures <span>(4)</span></label></div>

        <div class="filter-opt"><input type="checkbox" id="f-sacs" onchange="filterProducts()"/><label for="f-sacs">Sacs & Pochettes <span>(6)</span></label></div>

        <div class="filter-opt"><input type="checkbox" id="f-doudous" onchange="filterProducts()"/><label for="f-doudous">Doudous <span>(2)</span></label></div>
        <div class="filter-opt"><input type="checkbox" id="f-tenues" onchange="filterProducts()"/><label for="f-tenues">Tenues <span>(5)</span></label></div>
        <div class="filter-opt"><input type="checkbox" id="f-accessoires" onchange="filterProducts()"/><label for="f-accessoires">Accessoires <span>(3)</span></label></div>
      </div>
      <div class="filter-group">
        <h4>Prix maximum</h4>
        <input type="range" class="price-range" min="0" max="320" value="320" id="priceRange" oninput="updatePrice(this)"/>
        <div class="price-display"><span>0 €</span><span id="priceVal">320 €</span></div>
      </div>
      <a class="filter-reset" onclick="resetFilters()">Réinitialiser les filtres</a>
    </aside>

    <!-- PRODUCTS -->
    <div>
      <div class="cat-pills" id="catPills">
        <button class="cat-pill active" onclick="setCat('all',this)">Tout</button>
        <button class="cat-pill" onclick="setCat('packs',this)">Packs</button>
        <button class="cat-pill" onclick="setCat('couvertures',this)">Couvertures</button>
        <button class="cat-pill" onclick="setCat('gigoteuses',this)">Gigoteuses</button>
        <button class="cat-pill" onclick="setCat('sacs',this)">Sacs</button>
        <button class="cat-pill" onclick="setCat('bain',this)">Bain</button>
        <button class="cat-pill" onclick="setCat('doudous',this)">Doudous</button>
        <button class="cat-pill" onclick="setCat('tenues',this)">Tenues</button>
        <button class="cat-pill" onclick="setCat('accessoires',this)">Accessoires</button>
      </div>
      <div class="catalogue-top">
        <p class="cat-count"><span id="prodCount">0</span> articles</p>
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="default">Trier par défaut</option>
          <option value="price-asc">Prix croissant</option>
          <option value="price-desc">Prix décroissant</option>
          <option value="name">Nom A–Z</option>
        </select>
      </div>
      <div class="prod-grid" id="prodGrid"></div>
      <button class="btn-outline load-more" id="loadMoreBtn" onclick="loadMore()">Voir plus</button>
    </div>
  </div>

  <footer><div id="site-footer"></div></footer>

// ── CART STATE ──
const Cart = {
  items: JSON.parse(localStorage.getItem('edenelle_cart') || '[]'),
  
  add(item) {
    this.items.push(item);
    this.save();
    this.updateCount();
    this.showNotif(item.name);
  },
  
  remove(index) {
    this.items.splice(index, 1);
    this.save();
    this.updateCount();
  },
  
  save() {
    localStorage.setItem('edenelle_cart', JSON.stringify(this.items));
  },
  
  total() {
    return this.items.reduce((sum, i) => sum + i.price, 0).toFixed(2);
  },
  
  count() { return this.items.length; },
  
  updateCount() {
    document.querySelectorAll('.cart-count').forEach(el => {
      el.textContent = this.count();
      el.style.display = this.count() > 0 ? 'flex' : 'none';
    });
  },
  
  showNotif(name) {
    const notif = document.getElementById('cart-notif');
    if (!notif) return;
    notif.querySelector('.notif-name').textContent = name;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 3000);
  }
};

    let currentCat = 'all';
    let maxPrice = 320;
    let displayCount = 12;
    let sortMode = 'default';

    document.addEventListener('DOMContentLoaded', () => {
      renderNav('');
      renderBadgeStrip();
      renderFooter();
      // Check URL params
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      if (cat) {
        currentCat = cat;
        document.querySelectorAll('.cat-pill').forEach(p => {
          p.classList.toggle('active', p.textContent.toLowerCase().includes(cat) || (cat==='all' && p.textContent==='Tout'));
        });
        document.getElementById('breadcrumbCat').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      }
      renderProducts();
    });

    function getFiltered() {
      let prods = currentCat === 'all' ? [...PRODUCTS] : PRODUCTS.filter(p => p.cat === currentCat);
      prods = prods.filter(p => p.price <= maxPrice);
      if (sortMode === 'price-asc') prods.sort((a,b) => a.price - b.price);
      if (sortMode === 'price-desc') prods.sort((a,b) => b.price - a.price);
      if (sortMode === 'name') prods.sort((a,b) => a.name.localeCompare(b.name));
      return prods;
    }

    function renderProducts() {
      const prods = getFiltered();
      const grid = document.getElementById('prodGrid');
      const shown = prods.slice(0, displayCount);
      document.getElementById('prodCount').textContent = prods.length;
      grid.innerHTML = shown.map(p => `
        <a href="produit.html?id=${p.id}" class="product-card">
          <div class="product-img-wrap">
            <div class="product-img-placeholder">Photo produit</div>
            ${p.badge ? `<span class="product-badge${p.priceOriginal?' promo':''}">${p.badge}</span>` : ''}
          </div>
          <div class="product-info">
            <p class="product-cat">${p.cat}</p>
            <h3 class="product-name">${p.name}</h3>
            <div class="product-prices">
              <span class="price-current">${p.price.toFixed(2).replace('.',',')} €</span>
              ${p.priceOriginal ? `<span class="price-original">${p.priceOriginal} €</span>` : ''}
            </div>
          </div>
        </a>`).join('');
      document.getElementById('loadMoreBtn').style.display = prods.length > displayCount ? 'block' : 'none';
    }

    function setCat(cat, btn) {
      currentCat = cat;
      displayCount = 12;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    function filterProducts() { displayCount = 12; renderProducts(); }
    function sortProducts(val) { sortMode = val; renderProducts(); }
    function loadMore() { displayCount += 12; renderProducts(); }
    function updatePrice(el) { maxPrice = parseInt(el.value); document.getElementById('priceVal').textContent = maxPrice + ' €'; renderProducts(); }
    function resetFilters() { maxPrice = 320; document.getElementById('priceRange').value = 320; document.getElementById('priceVal').textContent = '320 €'; currentCat = 'all'; document.querySelectorAll('.cat-pill').forEach((p,i) => p.classList.toggle('active', i===0)); renderProducts(); }
